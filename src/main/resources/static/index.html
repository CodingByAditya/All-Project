<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><link rel="stylesheet" href="style.css"/>
  <title>Student Attendance</title>
</head>
<body class="center-page">
  <div class="card">
    <h1>🎓 Student Attendance</h1>
    <input type="text" id="studentName" placeholder="Student Name"/>
    <input type="text" id="registrationNo" placeholder="Registration No"/>
    <div class="datetime"><span id="date">--/--/----</span> | <span id="time">--:--:-- --</span></div>
    <video id="video" autoplay playsinline></video>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button onclick="startCamera()" style="flex:1">Camera ON</button>
      <button onclick="stopCamera()" style="flex:1">Camera OFF</button>
    </div>
    <button onclick="markAttendance()" style="width:100%; margin-top:10px;">✅ Mark Attendance</button>
    <p id="msg" class="msg info">Scan Teacher QR first.</p>
    <button class="btn-dashboard-link" onclick="location.href='teacher.html'">← Back to Teacher Dashboard</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
